<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>わくわくわり算トレーニング</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
            --primary-color: #4a90e2;
            --success-color: #4caf50;
            --error-color: #f44336;
            --text-color: #2c3e50;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            overflow: hidden;
        }

        #app-container {
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #333;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .view {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .view.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 共通ボタン */
        button {
            background: #fff;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            color: var(--primary-color);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            margin: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        /* 難易度選択 */
        .difficulty-btn {
            width: 80%;
            max-width: 300px;
        }

        .btn-easy { color: #4caf50; }
        .btn-normal { color: #ff9800; }
        .btn-hard { color: #f44336; }

        /* ゲーム画面 */
        .question-box {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #answer-input {
            width: 120px;
            font-size: 2.5rem;
            text-align: center;
            border: none;
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
            padding: 10px;
            font-family: inherit;
            color: var(--text-color);
            outline: none;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .score-display {
            font-size: 1rem;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        /* フィードバック表示 */
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
        }

        .show-feedback {
            animation: feedbackPop 0.6s ease forwards;
        }

        @keyframes feedbackPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 結果画面 */
        .result-score {
            font-size: 3rem;
            font-weight: 700;
            margin: 20px 0;
            color: var(--primary-color);
        }

        .result-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* レスポンシブ対応 */
        @media (max-width: 480px) {
            #app-container {
                width: 95%;
                padding: 30px 15px;
            }
            h1 { font-size: 1.5rem; }
            .question-box { font-size: 2.5rem; }
            #answer-input { font-size: 2rem; width: 100px; }
            button { padding: 12px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- フィードバック（〇・×） -->
        <div id="feedback"></div>

        <!-- 1. スタート画面 -->
        <div id="view-start" class="view active">
            <h1>わくわくわり算</h1>
            <p style="margin-bottom: 20px;">難易度を選んでスタート！</p>
            <button class="difficulty-btn btn-easy" onclick="startGame('easy')">かんたん (1〜5のだん)</button>
            <button class="difficulty-btn btn-normal" onclick="startGame('normal')">ふつう (1〜9のだん)</button>
            <button class="difficulty-btn btn-hard" onclick="startGame('hard')">むずかしい (2けた÷1けた)</button>
        </div>

        <!-- 2. ゲーム画面 -->
        <div id="view-game" class="view">
            <div class="score-display">だい <span id="current-question-num">1</span> もん / 全10問</div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div class="question-box">
                <span id="dividend">?</span>
                <span>÷</span>
                <span id="divisor">?</span>
                <span>=</span>
            </div>
            <input type="number" id="answer-input" inputmode="numeric" placeholder="?">
            <button id="submit-btn" onclick="checkAnswer()">こたえる！</button>
        </div>

        <!-- 3. 結果画面 -->
        <div id="view-result" class="view">
            <h1>おつかれさまでした！</h1>
            <div class="result-score"><span id="final-score">0</span> / 10</div>
            <div id="result-message" class="result-message"></div>
            <button onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <script>
        // 設定
        const TOTAL_QUESTIONS = 10;
        let currentDifficulty = 'easy';
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let currentCorrectAnswer = 0;

        // 音声ファイル (著作権フリー / 直リンク)
        const soundCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const soundWrong = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

        // ビュー切り替え
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
        }

        // ゲーム開始
        function startGame(difficulty) {
            currentDifficulty = difficulty;
            currentQuestionIndex = 0;
            correctCount = 0;
            nextQuestion();
            showView('game');
            document.getElementById('answer-input').focus();
        }

        // 次の問題を作成
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex > TOTAL_QUESTIONS) {
                showResult();
                return;
            }

            // 進捗表示
            document.getElementById('current-question-num').innerText = currentQuestionIndex;
            document.getElementById('progress-fill').style.width = `${(currentQuestionIndex - 1) / TOTAL_QUESTIONS * 100}%`;
            document.getElementById('answer-input').value = '';

            let a, b, c;
            // c (答え) と b (割る数) を先に決めることで割り切れる問題を作る
            if (currentDifficulty === 'easy') {
                b = Math.floor(Math.random() * 5) + 1; // 1〜5
                c = Math.floor(Math.random() * 9) + 1; // 1〜9
            } else if (currentDifficulty === 'normal') {
                b = Math.floor(Math.random() * 9) + 1; // 1〜9
                c = Math.floor(Math.random() * 9) + 1; // 1〜9
            } else {
                b = Math.floor(Math.random() * 8) + 2; // 2〜9
                c = Math.floor(Math.random() * 15) + 2; // 2〜16 (答えが2桁になるように)
            }

            a = b * c; // a = 割られる数
            currentCorrectAnswer = c;

            document.getElementById('dividend').innerText = a;
            document.getElementById('divisor').innerText = b;
        }

        // 答え合わせ
        function checkAnswer() {
            const inputField = document.getElementById('answer-input');
            const userAnswer = parseInt(inputField.value);
            const feedbackEl = document.getElementById('feedback');

            if (isNaN(userAnswer)) return;

            feedbackEl.classList.remove('show-feedback');
            void feedbackEl.offsetWidth; // 強制再描画

            if (userAnswer === currentCorrectAnswer) {
                // 正解
                correctCount++;
                soundCorrect.currentTime = 0;
                soundCorrect.play();
                feedbackEl.innerText = '◯';
                feedbackEl.style.color = '#4caf50';
            } else {
                // 不正解
                soundWrong.currentTime = 0;
                soundWrong.play();
                feedbackEl.innerText = '×';
                feedbackEl.style.color = '#f44336';
            }

            feedbackEl.classList.add('show-feedback');

            // 少し待って次の問題へ
            setTimeout(nextQuestion, 800);
        }

        // 結果発表
        function showResult() {
            document.getElementById('final-score').innerText = correctCount;
            let msg = "";
            if (correctCount === 10) {
                msg = "完ぺき！すごすぎるよ！";
                launchConfetti();
            } else if (correctCount >= 8) {
                msg = "そのちょうし！あともう少しだね！";
            } else if (correctCount >= 5) {
                msg = "がんばったね！次はいっぱい正解しよう！";
            } else {
                msg = "次はもっといいスコアを目指そう！";
            }
            document.getElementById('result-message').innerText = msg;
            showView('result');
        }

        // 紙吹雪
        function launchConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        // リセット
        function resetGame() {
            showView('start');
        }

        // Enterキーで回答送信
        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
